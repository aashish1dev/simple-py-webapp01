<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_info.name }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        p { line-height: 1.6; }
        form { margin-top: 20px; border: 1px solid #ccc; padding: 20px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Welcome to {{ app_info.name }}</h1>
    <p><strong>Version:</strong> {{ app_info.version }}</p>
    <p><strong>Description:</strong> {{ app_info.description }}</p>
    <p><strong>Author:</strong> {{ app_info.author }}</p>

    <h2>Update this Page</h2>
    <form action="/update" method="post">
        <label for="app_name">App Name:</label>
        <input type="text" id="app_name" name="app_name" value="{{ app_info.name }}" required>

        <label for="description">Description:</label>
        <input type="text" id="description" name="description" value="{{ app_info.description }}" required>

        <label for="person_name">Person Name:</label>
        <input type="text" id="person_name" name="person_name" placeholder="Enter your name">

        <button type="submit">Update</button>
    </form>
</body>
</html>
