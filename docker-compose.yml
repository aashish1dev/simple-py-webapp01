version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - FLASK_ENV=production
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: ${CLOUDWATCH_LOG_GROUP}
        awslogs-region: ${AWS_REGION}
        awslogs-create-group: "true"
        awslogs-stream-prefix: simple-py-webapp