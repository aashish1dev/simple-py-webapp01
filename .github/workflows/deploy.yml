name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ --tb=short

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Build and push Docker image to ECR
      run: |
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        IMAGE_NAME="${AWS_ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/simple-py-webapp01:${{ github.sha }}"
        aws ecr describe-repositories --repository-names simple-py-webapp01 >/dev/null 2>&1 || aws ecr create-repository --repository-name simple-py-webapp01
        aws ecr get-login-password | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
        docker build -t "${IMAGE_NAME}" .
        docker push "${IMAGE_NAME}"
        echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

    - name: Deploy to EC2 via SSM and Docker Compose
      run: |
        PARAMS=$(python - <<'PY'
import json, os
cmd = (
    f'cd {os.environ["DEPLOY_PATH"]} && '
    f'export CLOUDWATCH_LOG_GROUP="{os.environ["CLOUDWATCH_LOG_GROUP"]}" '
    f'AWS_REGION="{os.environ["AWS_REGION"]}" '
    f'APP_SECRET_KEY="{os.environ["APP_SECRET_KEY"]}" '
    f'DOCKER_IMAGE="{os.environ["IMAGE_NAME"]}" && '
    'docker compose pull && docker compose up -d'
)
print(json.dumps({"commands": [cmd]}))
PY
)
        aws ssm send-command \
          --instance-ids "${{ secrets.INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy simple-py-webapp01 via GitHub Actions" \
          --parameters "$PARAMS" \
          --timeout-seconds 600 \
          --output text