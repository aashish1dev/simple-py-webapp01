name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: simple-py-webapp01
  IMAGE_TAG: ${{ github.sha }}
  SECRETS_MANAGER_ID: simple-py-webapp01/prod/env

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ --tb=short

  build_with_push:
    needs: test
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image URI
        id: image
        shell: bash
        run: |
          set -e
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          echo "ECR_REGISTRY=${ECR_REGISTRY}"
          echo "IMAGE_URI=${IMAGE_URI}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.image.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build_with_push
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deploy image URI
        id: deploy_image
        shell: bash
        run: |
          set -e
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

          echo "Deploying IMAGE_URI=${IMAGE_URI}"

      - name: Deploy to EC2 via SSM
        id: deploy
        env:
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_URI} via GitHub Actions" \
            --parameters "commands=[
              \"set -e\",
              \"mkdir -p ${DEPLOY_PATH}\",
              \"cd ${DEPLOY_PATH}\",
              \"curl -fsSL -H 'Authorization: token ${GH_TOKEN}' -o docker-compose.yml https://raw.githubusercontent.com/${GH_REPO}/${GH_REF}/docker-compose.yml\",
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"export DOCKER_IMAGE=${IMAGE_URI}\",
              \"echo DOCKER_IMAGE=\\\$DOCKER_IMAGE\",
              \"docker compose --env-file <(aws secretsmanager get-secret-value --secret-id ${SECRETS_MANAGER_ID} --query SecretString --output text | python3 -c \\\"import json,sys; data=json.load(sys.stdin); [print(f'{k}={v}') for k,v in data.items()]\\\") pull\",
              \"docker compose --env-file <(aws secretsmanager get-secret-value --secret-id ${SECRETS_MANAGER_ID} --query SecretString --output text | python3 -c \\\"import json,sys; data=json.load(sys.stdin); [print(f'{k}={v}') for k,v in data.items()]\\\") up -d --force-recreate\"
            ]" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment to finish
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        run: |
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

      - name: Show deployment result
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json