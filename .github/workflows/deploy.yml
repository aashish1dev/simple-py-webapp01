name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ --tb=short

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to EC2 via SSM and Docker Compose
      run: |
        aws ssm send-command \
          --instance-ids "${{ secrets.INSTANCE_ID }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploy simple-py-webapp01 via GitHub Actions" \
          --parameters commands='["cd ${{ env.DEPLOY_PATH }}", "git pull origin main", "cat > .env <<'EOF'\nCLOUDWATCH_LOG_GROUP=${{ secrets.CLOUDWATCH_LOG_GROUP }}\nAWS_REGION=${{ secrets.AWS_REGION }}\nAPP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }}\nEOF", "docker compose build", "docker compose up -d"]' \
          --timeout-seconds 600 \
          --output text